<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WITH 자동 진단</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b1522;color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:40px}
.card{background:#fff;color:#000;border-radius:20px;padding:20px;margin-bottom:20px}
.input{width:100%;padding:14px;border-radius:10px;border:1px solid #ddd}
.btn{padding:14px;border:none;border-radius:10px;background:#2ea8ff;color:#fff;font-weight:bold;cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{padding:10px 14px;border-radius:999px;background:#eee;cursor:pointer}
.chip.active{background:#2ea8ff;color:#fff}
.summary{background:#f3f8ff;padding:15px;border-radius:12px;margin-top:10px}
.result{background:#fff;color:#000;padding:20px;border-radius:20px;margin-top:20px}
</style>
</head>

<body>
<div class="wrap">

<h2>WITH 자동 진단</h2>

<div class="card">

<input id="link" class="input" placeholder="네이버 지도 링크 입력"/>
<br><br>
<button class="btn" onclick="parse()">자동 분석</button>

<div id="summary" class="summary" style="display:none;"></div>

<br>

<input id="name" class="input" placeholder="업체명"/>
<br><br>
<input id="region" class="input" placeholder="지역"/>

<h4>업종</h4>
<div id="industry"></div>

<h4>위치</h4>
<div id="location"></div>

<br>
<button class="btn" onclick="generate()">결과 생성</button>

</div>

<div id="result" class="result"></div>

</div>

<script>

const industries = [
"고깃집","횟집","이자카야","술집","한식집","중식집","일식집","양식집",
"카페","디저트카페","베이커리","치킨집","햄버거집"
];

const locations = [
"역 바로 앞","역 도보 3분","역 도보 5~10분",
"골목 안쪽","대로변","상가 내부",
"오피스 상권","주택가","관광지"
];

let state={
industry:"",
location:""
};

function render(){
const iWrap=document.getElementById('industry');
const lWrap=document.getElementById('location');

iWrap.innerHTML="";
lWrap.innerHTML="";

industries.forEach(i=>{
const el=document.createElement('div');
el.className='chip'+(state.industry===i?' active':'');
el.innerText=i;
el.onclick=()=>{state.industry=i;render();}
iWrap.appendChild(el);
});

locations.forEach(l=>{
const el=document.createElement('div');
el.className='chip'+(state.location===l?' active':'');
el.innerText=l;
el.onclick=()=>{state.location=l;render();}
lWrap.appendChild(el);
});
}

function extractKeyword(url){
try{
const u=new URL(url);
return decodeURIComponent(u.searchParams.get('query')||u.searchParams.get('searchText')||"");
}catch{
return "";
}
}

function detect(keyword){
let text=keyword.replace(/\s/g,"");

const rules=[
{w:["횟집","회","대방어","광어"],i:"횟집"},
{w:["이자카야","꼬치","사케"],i:"이자카야"},
{w:["술집","포차","바","펍"],i:"술집"},
{w:["삼겹살","고기","갈비"],i:"고깃집"},
{w:["짜장","짬뽕","마라"],i:"중식집"},
{w:["초밥","라멘","돈카츠"],i:"일식집"},
{w:["파스타","피자","브런치"],i:"양식집"},
{w:["카페","커피"],i:"카페"},
{w:["케이크","디저트"],i:"디저트카페"},
{w:["베이커리","빵"],i:"베이커리"},
{w:["치킨"],i:"치킨집"},
{w:["버거","햄버거"],i:"햄버거집"}
];

for(let r of rules){
if(r.w.some(w=>text.includes(w))) return r.i;
}

return "";
}

function confidence(keyword,industry,region){
let score=0;
if(keyword) score+=40;
if(industry) score+=30;
if(region) score+=30;

if(score>=80) return "높음";
if(score>=50) return "보통";
return "낮음";
}

function parse(){
const link=document.getElementById('link').value;
const keyword=extractKeyword(link);
const industry=detect(keyword);

let region="";
const regionList=["강남","송파","잠실","건대","홍대","제주","서면"];
regionList.forEach(r=>{
if(keyword.includes(r)) region=r;
});

let name=keyword.replace(region,"").replace(industry,"").trim();

document.getElementById('name').value=name;
document.getElementById('region').value=region;
state.industry=industry;

const conf=confidence(keyword,industry,region);

document.getElementById('summary').style.display='block';
document.getElementById('summary').innerHTML=`
검색어: ${keyword || "-"}<br>
업종: ${industry || "-"}<br>
지역: ${region || "-"}<br>
업체명: ${name || "-"}<br>
신뢰도: ${conf}
`;

render();
}

function generate(){
const name=document.getElementById('name').value;
const region=document.getElementById('region').value;

const desc=`${region} ${state.industry} ${name}은 ${state.location} 위치에 있으며 방문 접근성이 좋고 검색 노출을 고려한 최적화 문구입니다.`;

document.getElementById('result').innerText=desc;
}

render();

</script>

</body>
</html>
